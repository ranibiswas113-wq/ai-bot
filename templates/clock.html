<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock - World Time</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #00d4ff;
            margin-bottom: 40px;
            font-size: 2.5em;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        .clock-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .clock-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 15px;
            padding: 25px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            box-shadow: 0 8px 32px rgba(0, 212, 255, 0.1);
        }

        .clock-card:hover {
            border-color: rgba(0, 212, 255, 0.7);
            box-shadow: 0 8px 32px rgba(0, 212, 255, 0.3);
            transform: translateY(-5px);
        }

        .timezone {
            font-size: 0.9em;
            color: #888;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .time {
            font-size: 2.5em;
            color: #00d4ff;
            font-weight: bold;
            margin: 15px 0;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        .date {
            font-size: 0.85em;
            color: #aaa;
        }

        .status {
            text-align: center;
            color: #666;
            font-size: 0.9em;
            padding-top: 20px;
        }

        .status.updating {
            color: #00d4ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌍 Digital Clock</h1>
        <div class="clock-grid" id="clockContainer"></div>
        <div class="status" id="status">Loading...</div>
    </div>

    <script>
        async function updateClocks() {
            try {
                const response = await fetch('/api/time');
                const times = await response.json();
                
                const container = document.getElementById('clockContainer');
                container.innerHTML = '';
                
                times.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'clock-card';
                    card.innerHTML = `
                        <div class="timezone">${item.timezone}</div>
                        <div class="time">${item.time}</div>
                        <div class="date">${item.date}</div>
                    `;
                    container.appendChild(card);
                });
                
                document.getElementById('status').textContent = `Last updated: ${new Date().toLocaleTimeString()}`;
                document.getElementById('status').classList.add('updating');
            } catch (error) {
                document.getElementById('status').textContent = 'Error loading times';
                console.error('Error:', error);
            }
        }

        // Update immediately
        updateClocks();
        
        // Update every second
        setInterval(updateClocks, 1000);
    </script>
</body>
</html>
