<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .search-box {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
        }

        .search-box input {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }

        .search-box button {
            padding: 12px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .search-box button:hover {
            background: #764ba2;
        }

        .weather-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
        }

        .weather-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 20px;
        }

        .weather-title {
            font-size: 2em;
            color: #333;
        }

        .weather-icon {
            font-size: 4em;
        }

        .temperature {
            font-size: 3em;
            color: #667eea;
            font-weight: bold;
        }

        .weather-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .weather-item {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .weather-item-label {
            font-size: 0.9em;
            color: #999;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .weather-item-value {
            font-size: 1.8em;
            color: #333;
            font-weight: bold;
        }

        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }

        .forecast-item {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            border-left: 4px solid #667eea;
        }

        .forecast-time {
            font-size: 0.9em;
            color: #999;
            margin-bottom: 10px;
        }

        .forecast-temp {
            font-size: 1.5em;
            color: #667eea;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .forecast-desc {
            font-size: 0.85em;
            color: #666;
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #c62828;
        }

        .loading {
            text-align: center;
            padding: 30px;
            color: #999;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .tab-btn {
            padding: 10px 20px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1em;
            color: #999;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
            font-weight: bold;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2em;
            }

            .search-box {
                flex-direction: column;
            }

            .weather-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌤️ Weather Dashboard</h1>
            <p>Get weather information for any city in the world</p>
        </header>

        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Enter city name...">
            <button onclick="searchWeather()">Search</button>
        </div>

        <div id="result"></div>
    </div>

    <script>
        async function searchWeather() {
            const city = document.getElementById('cityInput').value.trim();
            if (!city) {
                alert('Please enter a city name');
                return;
            }

            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div class="loading">Loading weather data...</div>';

            try {
                const [weatherRes, forecastRes] = await Promise.all([
                    fetch(`/api/weather/${city}`),
                    fetch(`/api/forecast/${city}`)
                ]);

                if (!weatherRes.ok) {
                    resultDiv.innerHTML = `<div class="error">❌ City not found</div>`;
                    return;
                }

                const weather = await weatherRes.json();
                const forecast = await (forecastRes.ok ? forecastRes.json() : Promise.resolve([]));

                displayWeather(weather, forecast);
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">❌ Error fetching weather data</div>`;
                console.error(error);
            }
        }

        function getWeatherIcon(iconCode) {
            const icons = {
                '01d': '☀️', '01n': '🌙',
                '02d': '⛅', '02n': '🌥️',
                '03d': '☁️', '03n': '☁️',
                '04d': '☁️', '04n': '☁️',
                '09d': '🌧️', '09n': '🌧️',
                '10d': '🌦️', '10n': '🌧️',
                '11d': '⛈️', '11n': '⛈️',
                '13d': '❄️', '13n': '❄️',
                '50d': '🌫️', '50n': '🌫️'
            };
            return icons[iconCode] || '🌤️';
        }

        function displayWeather(weather, forecast) {
            const icon = getWeatherIcon(weather.icon);
            const forecastHTML = forecast.length > 0 ? `
                <h3 style="margin-top: 30px; margin-bottom: 15px; color: #333;">📅 5-Day Forecast</h3>
                <div class="forecast-grid">
                    ${forecast.slice(0, 8).map(f => `
                        <div class="forecast-item">
                            <div class="forecast-time">${f.time}</div>
                            <div class="forecast-temp">${Math.round(f.temperature)}°C</div>
                            <div class="forecast-desc">${f.description}</div>
                            <div style="font-size: 1.5em; margin: 10px 0;">${getWeatherIcon(f.icon)}</div>
                        </div>
                    `).join('')}
                </div>
            ` : '';

            document.getElementById('result').innerHTML = `
                <div class="weather-card">
                    <div class="weather-header">
                        <div>
                            <div class="weather-title">${weather.city}, ${weather.country}</div>
                            <div style="color: #999; margin-top: 5px;">${weather.description}</div>
                        </div>
                        <div class="weather-icon">${icon}</div>
                    </div>

                    <div style="text-align: center; margin-bottom: 30px;">
                        <div class="temperature">${Math.round(weather.temperature)}°C</div>
                        <div style="color: #999;">Feels like ${Math.round(weather.feels_like)}°C</div>
                    </div>

                    <div class="weather-grid">
                        <div class="weather-item">
                            <div class="weather-item-label">Min/Max</div>
                            <div class="weather-item-value">${Math.round(weather.temp_min)}° / ${Math.round(weather.temp_max)}°</div>
                        </div>
                        <div class="weather-item">
                            <div class="weather-item-label">Humidity</div>
                            <div class="weather-item-value">${weather.humidity}%</div>
                        </div>
                        <div class="weather-item">
                            <div class="weather-item-label">Wind Speed</div>
                            <div class="weather-item-value">${weather.wind_speed} m/s</div>
                        </div>
                        <div class="weather-item">
                            <div class="weather-item-label">Pressure</div>
                            <div class="weather-item-value">${weather.pressure} hPa</div>
                        </div>
                        <div class="weather-item">
                            <div class="weather-item-label">Cloudiness</div>
                            <div class="weather-item-value">${weather.cloudiness}%</div>
                        </div>
                        <div class="weather-item">
                            <div class="weather-item-label">Visibility</div>
                            <div class="weather-item-value">${(weather.visibility / 1000).toFixed(1)} km</div>
                        </div>
                    </div>

                    ${forecastHTML}
                </div>
            `;
        }

        // Allow Enter key to search
        document.getElementById('cityInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchWeather();
        });
    </script>
</body>
</html>
